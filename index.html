<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏫 학교생활로 알아보는 MBTI 테스트</title>
    <style>
        /* 폰트 및 기본 스타일 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        :root {
            --bg-deep-green: #0b251a;       /* 전체 배경 딥그린 */
            --card-deep-green: #143626;     /* 메인 컨테이너 딥그린 */
            --gold-accent: #dfb15b;         /* 골드 포인트 색상 */
            --gold-hover: #f5cf7a;          /* 골드 호버 */
            --soft-green: #23533c;          /* 부드러운 그린 */
            --text-light: #f0f7f4;          /* 밝은 텍스트 */
            --text-muted: #a3b899;          /* 흐린 텍스트 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-deep-green);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-deep-green);
            max-width: 520px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            padding: 40px 30px;
            text-align: center;
            border: 2px solid var(--gold-accent);
            position: relative;
        }

        /* 공통 버튼 스타일 */
        button {
            cursor: pointer;
            outline: none;
            transition: all 0.25s ease-in-out;
        }

        .btn-main {
            background-color: var(--gold-accent);
            color: var(--bg-deep-green);
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 25px;
            box-shadow: 0 4px 15px rgba(223, 177, 91, 0.3);
        }

        .btn-main:hover {
            background-color: var(--gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(223, 177, 91, 0.5);
        }

        /* 시작 화면 */
        #start-screen .icon {
            font-size: 5rem;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        #start-screen h1 {
            color: var(--gold-accent);
            font-size: 2rem;
            margin-bottom: 15px;
            word-break: keep-all;
            line-height: 1.4;
        }

        #start-screen p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        /* 질문 화면 */
        #question-screen {
            display: none;
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-text {
            font-size: 0.95rem;
            color: var(--gold-accent);
            font-weight: bold;
        }

        .progress-bar {
            width: 80%;
            height: 10px;
            background-color: var(--soft-green);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(223, 177, 91, 0.2);
        }

        .progress {
            height: 100%;
            background-color: var(--gold-accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 35px;
            word-break: keep-all;
            line-height: 1.5;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn-answer {
            background-color: var(--soft-green);
            border: 2px solid transparent;
            color: var(--text-light);
            padding: 22px 20px;
            font-size: 1.05rem;
            border-radius: 16px;
            text-align: left;
            font-weight: 500;
            line-height: 1.4;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-answer:hover {
            border-color: var(--gold-accent);
            background-color: #2c6349;
            transform: translateX(4px);
        }

        /* 결과 화면 */
        #result-screen {
            display: none;
        }

        #result-screen h2 {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .result-mbti {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--gold-accent);
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(223, 177, 91, 0.3);
        }

        .result-tags {
            font-size: 2rem;
            margin-bottom: 25px;
        }

        .result-desc {
            background-color: var(--soft-green);
            padding: 25px;
            border-radius: 18px;
            color: var(--text-light);
            font-size: 1.05rem;
            line-height: 1.7;
            text-align: left;
            margin-bottom: 30px;
            word-break: keep-all;
            border-left: 5px solid var(--gold-accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 시작 화면 -->
        <div id="start-screen">
            <div class="icon">🏫✨</div>
            <h1>학교생활로 알아보는<br>나의 찐 MBTI 테스트</h1>
            <p>교문을 나설 때부터 야자 종이 칠 때까지,</p>
            <p>더 디테일해진 8문항으로 나의 성향을 확인해봐요!</p>
            <button class="btn-main" onclick="startTest()">테스트 시작하기 📝</button>
        </div>

        <!-- 2. 질문 화면 -->
        <div id="question-screen">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <div class="progress-text" id="progress-text">1 / 8</div>
            </div>
            <div class="question-text" id="question">질문 텍스트</div>
            <div class="answer-box">
                <button class="btn-answer" id="answerA" onclick="selectAnswer('A')">선택지 A</button>
                <button class="btn-answer" id="answerB" onclick="selectAnswer('B')">선택지 B</button>
            </div>
        </div>

        <!-- 3. 결과 화면 -->
        <div id="result-screen">
            <h2>당신의 학교생활 스타일은?</h2>
            <div class="result-mbti" id="result-mbti">ISFP</div>
            <div class="result-tags" id="result-tags">🎨 🛌 🧃</div>
            <div class="result-desc" id="result-desc">결과 설명</div>
            <button class="btn-main" onclick="restartTest()">다시 테스트하기 🔄</button>
        </div>
    </div>

    <script>
        // 데이터 정의: 8개 질문 리스트 (지표당 2문항씩 배치)
        const questions = [
            {
                type: "EI",
                q: "🏃‍♂️ 드디어 기다리던 점심시간! 당신의 행동은?",
                a: "친구들 무리에 슬쩍 껴서 왁자지껄 수다 떨며 밥 먹으러 간다.",
                b: "친한 친구 한두 명과 조용히 먹거나, 자리에서 편하게 쉬고 싶다."
            },
            {
                type: "SN",
                q: "💡 선생님이 수행평가 주제를 '자유 주제'로 내주셨다!",
                a: "과거 선배들이 했던 무난하고 안전한 주제나 확실한 예시부터 찾아본다.",
                b: "아무도 안 했을 법한 기발하고 독특한 아이디어를 혼자 상상해 본다."
            },
            {
                type: "TF",
                q: "😢 친구가 시험을 망쳤다며 속상해하고 있을 때 당신의 위로는?",
                a: "몇 번 문제 틀렸어? 오답노트 같이 보면서 다음엔 실수하지 말자고 한다.",
                b: "아이고 속상했겠다... ㅠㅠ 시험이 너무 어려웠어! 맛있는 거 먹으러 가자!"
            },
            {
                type: "JP",
                q: "📅 시험 기간 D-3주! 당신의 공부 계획은?",
                a: "주별, 일별로 과목을 쪼개서 철저하게 계획표를 짜고 그대로 실천한다.",
                b: "일단 시험 범위만 쓱 훑어보고, 공부는 원래 일주일 전부터 몰아서 하는 법!"
            },
            {
                type: "EI",
                q: "🏫 새 학기 첫날, 교실 문을 열고 들어섰을 때 내 마음은?",
                a: "새로운 친구들을 만날 생각에 은근히 설레고 누구 자리에 앉을지 탐색한다.",
                b: "낯선 공기에 기가 좀 빨리고, 우선 조용히 뒤쪽 빈자리에 가서 앉는다."
            },
            {
                type: "SN",
                q: "📖 멍하니 수업을 듣다가 창밖을 바라볼 때 드는 생각은?",
                a: "'날씨 좋다, 끝나고 뭐 먹지?', '체육 교과서 가져왔나?' 같은 현실적인 생각",
                b: "'갑자기 학교에 좀비가 나타나면 어떻게 탈출하지?' 같은 상상의 나래"
            },
            {
                type: "TF",
                q: "💬 조별과제 중 한 조원이 '미안, 사정이 있어서 자료조사 늦어질 것 같아'라고 한다면?",
                a: "사정은 안타깝지만 조 전체에 피해가 가니까, 언제까지 가능한지 정확한 기한을 요구한다.",
                b: "많이 바쁜가 보네 ㅠㅠ 힘들겠다! 괜찮으니까 가능한 만큼만 먼저 보내달라고 다독인다."
            },
            {
                type: "JP",
                q: "🎒 주말에 친구들과 시험이 끝난 기념으로 놀러 가기로 했다. 내 스타일은?",
                a: "맛집, 코인노래방, 카페 동선과 시간대까지 미리 싹 다 알아보고 공유한다.",
                b: "만나는 시간และ 장소만 정해두고, 구체적인 행선지는 만나서 땡기는 대로 정한다."
            }
        ];

        // 데이터 정의: 결과리스트
        const results = {
            "ESTJ": { tags: "📢 🔍 📐", desc: "학급의 든든한 반장 스타일! 규칙과 계획을 중요하게 생각하며 과제를 할 때도 완벽한 효율을 추구합니다." },
            "ESTP": { tags: "🔥 ⚡ ⚽", desc: "체육시간의 지배자! 활발하고 에너지가 넘치며, 말보다는 행동으로 학교생활을 다이내믹하게 즐깁니다." },
            "ESFJ": { tags: "🌸 🤝 💌", desc: "모든 친구를 챙기는 다정다감 인싸! 반에 소외되는 친구가 없도록 챙겨주는 따뜻한 마당발입니다." },
            "ESFP": { tags: "🎉 🎤 🕺", desc: "축제 무대 주인공은 나야 나! 분위기 메이커 역할을 톡톡히 하며 매일 학교 오는 것이 축제 같은 스타일입니다." },
            "ENTJ": { tags: "👑 🚀 🎯", desc: "조별과제 프리패스 조장! 리더십이 뛰어나 팀원들을 일사불란하게 이끌고 무조건 A+을 받아내는 능력자입니다." },
            "ENTP": { tags: "🧐 💬 🎪", desc: "선생님 말씀에 '왜요?'를 담당하는 호기심 천국! 토론 시간에 가장 눈이 반짝이며, 재치 있는 말재주로 인기가 많습니다." },
            "ENFJ": { tags: "🌟 📻 🕊️", desc: "고민 상담소의 다정한 선배! 친구들의 이야기에 깊이 공감해 주고 긍정적인 에너지를 뿜뿜 풍기는 리더입니다." },
            "ENFP": { tags: "🌈 🦄 🎈", desc: "쉬는 시간마다 다른 반 투어 다니는 댕댕이! 리액션이 제일 좋고 창의적이며 번뜩이는 아이디어가 많습니다." },
            "ISTJ": { tags: "📝 ⏱️ 🎒", desc: "조용히 전교 상위권을 지키는 정석파! 교과서, 필기 도구가 항상 완벽히 정리되어 있고 성실함의 끝판왕입니다." },
            "ISTP": { tags: "🛹 🛠️ 🕶️", desc: "종 치면 칼같이 사라지는 효율주의자! 말수는 적지만 은근히 다재다능하고 벼락치기에 엄청난 재능을 보입니다." },
            "ISFJ": { tags: "🧸 🥛 🩹", desc: "가방 안에 온갖 비상약을 챙겨 다니는 천사! 뒤에서 묵묵히 친구들을 돕고 배려해 주는 따뜻한 수호천사입니다." },
            "ISFP": { tags: "🎨 🛌 🧃", desc: "하교 후 침대와의 물아일체를 꿈꾸는 평화주의자! 갈등을 싫어하며 혼자 조용히 낙서하거나 음악 듣는 것을 좋아합니다." },
            "INTJ": { tags: "🔮 🧩 👁️", desc: "혼자만의 세계가 확실한 전략가! 쉬는 시간에도 책을 읽거나 심오한 생각을 하며, 계획한 목표는 독하게 이뤄냅니다." },
            "INTP": { tags: "🧪 💻 🔲", desc: "자신이 좋아하는 과목만 100점 맞는 천재형! 관심 없는 수업엔 멍 때리지만 독특한 분야 지식이 해박합니다." },
            "INFJ": { tags: "🌙 📜 🔮", desc: "은밀하게 친구들을 관찰하는 다정한 은둔자! 속 깊은 생각과 일기 쓰기를 좋아하며 깊은 우정을 소중히 여깁니다." },
            "INFP": { tags: "🍀 💭 🎧", desc: "감수성 폭발하는 프로 망상러! 창가 자리에 앉아 이어폰을 끼고 한 편의 영화를 찍는 로맨티스트입니다." }
        };

        let currentIdx = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        const startScreen = document.getElementById("start-screen");
        const questionScreen = document.getElementById("question-screen");
        const resultScreen = document.getElementById("result-screen");

        // 테스트 시작
        function startTest() {
            startScreen.style.display = "none";
            questionScreen.style.display = "block";
            showQuestion();
        }

        // 질문 렌더링
        function showQuestion() {
            if (currentIdx >= questions.length) {
                showResult();
                return;
            }
            
            // 진행도 바 및 텍스트 업데이트
            const progress = document.getElementById("progress");
            progress.style.width = `${((currentIdx) / questions.length) * 100}%`;
            document.getElementById("progress-text").innerText = `${currentIdx + 1} / ${questions.length}`;

            const currentQ = questions[currentIdx];
            document.getElementById("question").innerText = currentQ.q;
            document.getElementById("answerA").innerText = currentQ.a;
            document.getElementById("answerB").innerText = currentQ.b;
        }

        // 답변 선택 시 점수 계산
        function selectAnswer(type) {
            const currentQ = questions[currentIdx];
            const mbtiType = currentQ.type; // 예: "EI"

            if (type === 'A') {
                scores[mbtiType[0]]++;
            } else {
                scores[mbtiType[1]]++;
            }

            currentIdx++;
            showQuestion();
        }

        // 결과 산출 및 화면 전환
        function showResult() {
            questionScreen.style.display = "none";
            resultScreen.style.display = "block";

            let mbti = "";
            mbti += scores.E >= scores.I ? "E" : "I";
            mbti += scores.S >= scores.N ? "S" : "N";
            mbti += scores.T >= scores.F ? "T" : "F";
            mbti += scores.J >= scores.P ? "J" : "P";

            const resultData = results[mbti];
            
            document.getElementById("result-mbti").innerText = mbti;
            document.getElementById("result-tags").innerText = resultData.tags;
            document.getElementById("result-desc").innerText = resultData.desc;
        }

        // 다시 하기
        function restartTest() {
            currentIdx = 0;
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            resultScreen.style.display = "none";
            startScreen.style.display = "block";
        }
    </script>
</body>
</html>
